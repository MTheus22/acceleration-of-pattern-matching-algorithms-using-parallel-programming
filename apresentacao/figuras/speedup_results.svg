<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="100%" height="100%">

<style>
    .bg { fill: #ffffff; }
    .grid-line { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 2 2; }
    .axis { stroke: #64748b; stroke-width: 1.5; }
    .axis-label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; fill: #334155; font-weight: bold; }
    .tick-label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; fill: #64748b; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; fill: #1e293b; font-weight: bold; text-anchor: middle; }
    .legend-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; fill: #334155; }
    .ideal-line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 4; }
    .snort-line { stroke: #2563eb; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .et-line { stroke: #ef4444; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .snort-marker { fill: #2563eb; stroke: #ffffff; stroke-width: 1.5; }
    .et-marker { fill: #ef4444; stroke: #ffffff; stroke-width: 1.5; }
    .annotation-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; font-weight: bold; }
    .annotation-arrow { stroke-width: 1.5; fill: none; }
</style>

<rect width="800" height="550" class="bg"/>
<line x1="90" y1="480.0" x2="750" y2="480.0" class="grid-line"/>
<text x="75" y="484.0" text-anchor="end" class="tick-label">0,0x</text>
<line x1="90" y1="413.33333333333337" x2="750" y2="413.33333333333337" class="grid-line"/>
<text x="75" y="417.33333333333337" text-anchor="end" class="tick-label">1,0x</text>
<line x1="90" y1="346.6666666666667" x2="750" y2="346.6666666666667" class="grid-line"/>
<text x="75" y="350.6666666666667" text-anchor="end" class="tick-label">2,0x</text>
<line x1="90" y1="280.0" x2="750" y2="280.0" class="grid-line"/>
<text x="75" y="284.0" text-anchor="end" class="tick-label">3,0x</text>
<line x1="90" y1="213.33333333333337" x2="750" y2="213.33333333333337" class="grid-line"/>
<text x="75" y="217.33333333333337" text-anchor="end" class="tick-label">4,0x</text>
<line x1="90" y1="146.66666666666663" x2="750" y2="146.66666666666663" class="grid-line"/>
<text x="75" y="150.66666666666663" text-anchor="end" class="tick-label">5,0x</text>
<line x1="90" y1="80.0" x2="750" y2="80.0" class="grid-line"/>
<text x="75" y="84.0" text-anchor="end" class="tick-label">6,0x</text>
<line x1="90.0" y1="80" x2="90.0" y2="480" class="grid-line"/>
<text x="90.0" y="500" text-anchor="middle" class="tick-label">1</text>
<line x1="150.0" y1="80" x2="150.0" y2="480" class="grid-line"/>
<text x="150.0" y="500" text-anchor="middle" class="tick-label">2</text>
<line x1="270.0" y1="80" x2="270.0" y2="480" class="grid-line"/>
<text x="270.0" y="500" text-anchor="middle" class="tick-label">4</text>
<line x1="390.0" y1="80" x2="390.0" y2="480" class="grid-line"/>
<text x="390.0" y="500" text-anchor="middle" class="tick-label">6</text>
<line x1="510.0" y1="80" x2="510.0" y2="480" class="grid-line"/>
<text x="510.0" y="500" text-anchor="middle" class="tick-label">8</text>
<line x1="630.0" y1="80" x2="630.0" y2="480" class="grid-line"/>
<text x="630.0" y="500" text-anchor="middle" class="tick-label">10</text>
<line x1="750.0" y1="80" x2="750.0" y2="480" class="grid-line"/>
<text x="750.0" y="500" text-anchor="middle" class="tick-label">12</text>
<line x1="90" y1="80" x2="90" y2="480" class="axis"/>
<line x1="90" y1="480" x2="750" y2="480" class="axis"/>
<text x="420.0" y="525" text-anchor="middle" class="axis-label">Número de Threads (T)</text>
<text x="25" y="280.0" text-anchor="middle" transform="rotate(-90 25 280.0)" class="axis-label">Speedup vs. Sequencial</text>
<text x="400.0" y="40" class="title">Escalabilidade do Paralelismo de Texto por Dicionário</text>
<line x1="90.0" y1="413.33333333333337" x2="390.0" y2="80.0" class="ideal-line"/>
<polyline points="90.0,410.66666666666663 270.0,318.0 510.0,239.33333333333331 750.0,178.66666666666669" class="snort-line"/>
<polyline points="90.0,404.0 270.0,348.0 510.0,304.0 750.0,294.0" class="et-line"/>
<rect x="85.0" y="405.66666666666663" width="10" height="10" class="snort-marker"/>
<rect x="265.0" y="313.0" width="10" height="10" class="snort-marker"/>
<rect x="505.0" y="234.33333333333331" width="10" height="10" class="snort-marker"/>
<rect x="745.0" y="173.66666666666669" width="10" height="10" class="snort-marker"/>
<polygon points="90.0,398.0 84.0,409.0 96.0,409.0" class="et-marker"/>
<polygon points="270.0,342.0 264.0,353.0 276.0,353.0" class="et-marker"/>
<polygon points="510.0,298.0 504.0,309.0 516.0,309.0" class="et-marker"/>
<polygon points="750.0,288.0 744.0,299.0 756.0,299.0" class="et-marker"/>
<path d="M 720.0 158.66666666666669 L 742.0 173.66666666666669" class="annotation-arrow" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
<text x="715.0" y="153.66666666666669" text-anchor="end" class="annotation-text" fill="#1d4ed8">Pico: 4,52x (12 threads)</text>
<path d="M 710.0 334.0 L 740.0 304.0" class="annotation-arrow" stroke="#ef4444" marker-end="url(#arrow-red)"/>
<text x="705.0" y="339.0" text-anchor="end" class="annotation-text" fill="#b91c1c">Saturação da banda de memória (DRAM)</text>
<text x="705.0" y="352.0" text-anchor="end" class="annotation-text" fill="#b91c1c" style="font-size:10px; font-weight:normal;">Queda de eficiência com E-cores adicionais</text>
<rect x="110" y="100" width="340" height="90" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="4"/>
<line x1="125" y1="120" x2="155" y2="120" class="ideal-line"/>
<text x="165" y="124" class="legend-text">Ideal (Linear)</text>
<line x1="125" y1="145" x2="155" y2="145" class="snort-line"/>
<rect x="135" y="140" width="10" height="10" class="snort-marker"/>
<text x="165" y="149" class="legend-text">Snort (55 MiB - Excede a L3, regime moderado)</text>
<line x1="125" y1="170" x2="155" y2="170" class="et-line"/>
<polygon points="140,164 134,175 146,175" class="et-marker"/>
<text x="165" y="174" class="legend-text">Emerging Threats (507 MiB - Limitado por DRAM)</text>

<defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
</defs>

</svg>