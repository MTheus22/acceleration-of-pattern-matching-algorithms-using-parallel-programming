<div class="grid">

      <li><strong>O desafio do software:</strong> Para obter ganhos de desempenho, o software não ganha mais aceleração "de graça"; ele precisa ser explicitamente projetado para execução paralela.</li>

<h1 id="o-algoritmo-aho%E2%80%93corasick-eficiente-por%C3%A9m-sequencial">O Algoritmo Aho–Corasick: Eficiente, porém Sequencial</h1>
<div class="grid">
  <div class="col-60">
    <ul>
      <li><strong>Aho-Corasick (AC):</strong> Algoritmo de casamento de múltiplos padrões em tempo linear <em>O</em>(<em>n</em> + <em>z</em>), realizando a busca em uma única passada pelo texto.</li>
      <li><strong>Aplicações Críticas:</strong> Espinha dorsal de sistemas de segurança como <strong>Snort/Suricata (NIDS)</strong>, YARA (detecção de malware), filtros de spam e bioinformática.</li>
      <li><strong>A Limitação Sequencial:</strong>
        <ul>
          <li>O autômato avança estritamente caractere por caractere (da esquerda para a direita).</li>
          <li>Cada transição depende do estado anterior.</li>
          <li>Isso torna o algoritmo <strong>intrinsecamente sequencial</strong>, utilizando apenas <strong>1 núcleo</strong> do hardware moderno.</li>
        </ul>
      </li>
    </ul>
  </div>
  <div class="col-40">
    <div class="card">
      <div class="card-header">Aplicações do Aho–Corasick</div>
      <ul>
        <li>Snort / Suricata — IDS de rede (NIDS)</li>
        <li>YARA — classificação de malware</li>
        <li>Filtros de spam e antivírus</li>
        <li>Bioinformática — busca de motivos em DNA</li>
      </ul>
    </div>
    <div class="metric-box negative">
      <div class="metric-value">1 núcleo</div>
      <div class="metric-label">Sequencial por natureza: usa apenas um núcleo, mesmo em CPUs multi-core</div>
    </div>
  </div>
</div>
</section>

<div class="grid">

      <li><strong>Crescimento de Assinaturas:</strong> Dicionários de NIDS geram autômatos de <strong>centenas de megabytes</strong>.</li>

      <li><strong>Falta de Caracterização:</strong> Lacuna na avaliação desse limite em <strong>CPUs híbridas modernas</strong>.</li>
    </ul>

<blockquote>
  <strong>Objetivo Geral:</strong> Projetar, implementar e avaliar uma versão paralela do algoritmo Aho–Corasick para CPUs multi-core de memória compartilhada usando POSIX Threads (pthreads), a fim de acelerar o casamento de múltiplos padrões sobre entradas grandes.
</blockquote>

    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="card-header text-blue">2. Quantificar</div>

  <div class="col">

<h1 id="paralelismo-de-mem%C3%B3ria-compartilhada-e-pthreads">Paralelismo de Memória Compartilhada e Pthreads</h1>
<div class="grid">
  <div class="col-65">
    <h3>Design de Concorrência Eficiente:</h3>
    <ul>
      <li><strong>Compartilhamento de Endereço:</strong> Em CPUs multi-core, as threads compartilham a memória RAM, permitindo que todas acessem um único autômato na memória de forma concorrente.</li>
      <li><strong>Estado Read-Only:</strong> O autômato de busca é estritamente <strong>somente leitura</strong> após construído.
        <ul>
          <li><strong>Hot path livre de locks:</strong> Nenhuma thread worker usa exclusão mútua (<em>mutex</em>) ou operações atômicas durante o laço principal de casamento de padrões.</li>
        </ul>
      </li>

<h1 id="o-fator-decisivo-hierarquia-de-cache-e-n%C3%BAcleos-h%C3%ADbridos">O Fator Decisivo: Hierarquia de Cache e Núcleos Híbridos</h1>
<div class="grid">
  <div class="col-60">
    <ul>
      <li><strong>Hierarquia de Memória:</strong> Caches L1 e L2 são rápidas e privadas por núcleo. A cache L3 (LLC) é compartilhada e mais lenta. A DRAM (memória física) é ordens de grandeza mais lenta.</li>
      <li><strong>Saturação por Banda de Memória:</strong> Em regime <em>memory-bound</em>, as threads concorrentes passam a competir pela banda limitada do barramento DRAM, achatando a curva de escalabilidade.</li>
      <li><strong>Arquitetura Híbrida (x86 P/E):</strong>
        <ul>
          <li><strong>P-Cores (Performance):</strong> Velozes, com Hyper-Threading (HT).</li>
          <li><strong>E-Cores (Efficiency):</strong> Lentos, sem HT, otimizados para consumo.</li>
          <li>Gera um desequilíbrio intrínseco de carga (estrangulamento em barreira).</li>
        </ul>
      </li>
    </ul>
  </div>
  <div class="col-40">
    <div class="card">
      <div class="card-header text-blue">Estrutura Híbrida Típica</div>
      <ul>
        <li><strong>P-Cores:</strong> 2 núcleos (4 threads de hardware)</li>
        <li><strong>E-Cores:</strong> 8 núcleos (8 threads de hardware)</li>
        <li><strong>L3 LLC:</strong> 12 MiB compartilhados</li>
      </ul>
    </div>
    <div class="metric-box negative">
      <div class="metric-value">"Joelho"</div>
      <div class="metric-label">Desvio na escalabilidade ao cruzar P-cores e E-cores</div>
    </div>
  </div>
</div>
</section>

<div class="grid">
  <div class="col-60">
    <p>Uma <strong>Revisão Sistemática da Literatura (RSL)</strong> foi conduzida para mapear o estado da arte, guiada por duas questões de pesquisa:</p>
    <div class="card">
      <div class="card-header text-blue">RQ1 — Técnicas e desafios</div>
      <p>Quais técnicas de paralelização e desafios associados estão documentados na literatura para implementar o Aho–Corasick com <em>threads</em> em CPUs multi-core?</p>
    </div>
    <div class="card">
      <div class="card-header text-blue">RQ2 — Otimizações em segurança</div>
      <p>Quais otimizações específicas do Aho–Corasick são empregadas em cenários com grandes conjuntos de padrões, particularmente no domínio da segurança da informação?</p>
    </div>
    <p><strong>Bases:</strong> IEEE Xplore, ACM DL, Scopus, Web of Science · <strong>Período:</strong> 2015–2025 · busca em maio/2025.</p>
  </div>

<h1 id="rsl-estado-da-arte-e-lacunas">RSL: Estado da Arte e Lacunas</h1>
<p>Da análise dos 10 estudos primários selecionados na literatura, emergiram 3 consensos:</p>
<div class="grid">
  <div class="col">
    <div class="card">
      <div class="card-header">1. Divisão por Texto e Overlap</div>
      <p>Dividir o texto em chunks com overlap periférico (warm-up) de tamanho L<sub>max</sub> − 1 é a técnica consolidada para garantir correção sem comunicação (Qu et al., Jepsen et al.).</p>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="card-header">2. Gargalo de Cache L3</div>
      <p>O tamanho do autômato dita a degradação microarquitetural. Propostas como decomposição Head-Body tentam amenizar a pressão de cache de último nível (Lee & Yang).</p>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="card-header text-red">A Lacuna Científica</div>
      <p>Faltava caracterizar a paralelização do Aho–Corasick no <strong>regime memory-bound</strong> (autômato ≫ LLC) em CPUs multi-core <em>commodity</em>, programadas nativamente em C com pthreads e validadas contra o baseline sequencial.</p>
    </div>
  </div>
</div>
<footer>Estudos citados: Qu et al. (2016); Lee &amp; Yang (2017); Jepsen et al. (2019) — referências completas no TCC.</footer>
</section>

<h1 id="proposta-a-decis%C3%A3o-estrutural-%C3%BAnica">Proposta: A Decisão Estrutural Única</h1>
<p>O design de software proposto no trabalho baseia-se em fases de execução bem delimitadas:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[Fase 1: Construção Sequencial]
  Thread mestre constrói a Trie, calcula links de falha e compila a tabela DFA.
       │

<h1 id="particionamento-do-texto--overlap-de-borda">Particionamento do Texto + Overlap de Borda</h1>
<div class="grid">
  <div class="col-60">
    <ul>
      <li>O arquivo de entrada é segmentado em <em>T</em> partes contíguas, uma por thread.</li>
      <li><strong>O Problema da Fronteira:</strong> Padrões que iniciam em um segmento e terminam no seguinte seriam perdidos.</li>
      <li><strong>A Solução por Overlap:</strong> Cada worker da thread <em>i</em> &gt; 0 inicia a busca L<sub>max</sub> − 1 bytes antes do início oficial do seu bloco (onde L<sub>max</sub> é o comprimento do padrão mais longo).
        <ul>
          <li>Funciona como um <em>warm-up</em> de estado.</li>
          <li>Garante correspondência <strong>matematicamente idêntica (1:1)</strong> em relação ao algoritmo sequencial, sem comunicação entre threads.</li>
        </ul>
      </li>
    </ul>
  </div>
  <div class="col-40">
    <div class="card">
      <div class="card-header text-blue">Esquema de Overlap</div>
      <div>Segmento Thread 0</div>
      <div>
        <div>L<sub>max</sub> − 1 (overlap)</div>
        <div>Segmento Thread 1</div>
      </div>
      <p>O overlap garante que os padrões que cruzam a fronteira física de blocos sejam lidos e registrados por exatamente um worker.</p>
    </div>
  </div>
</div>
</section>

<h1 id="as-quatro-estrat%C3%A9gias-projetadas-e-avaliadas">As Quatro Estratégias Projetadas e Avaliadas</h1>
<div class="grid">
  <div class="col">
    <div class="card">
      <div class="card-header text-blue">1. Paralelismo de Texto Flat</div>
      <p>Chunking uniforme do texto associado ao <strong>Flat Output Layout</strong>: troca ponteiros espalhados por arrays contíguos de emissão. Minimiza cache misses no matching.</p>
    </div>
    <div class="card">
      <div class="card-header">2. Balanceamento Heterogêneo</div>
      <p>Duas variantes para evitar lentidão nos E-cores:
      • <em>Frequency-Weighted:</em> Partições proporcionais às capacidades dos núcleos.
      • <em>Dynamic Dispatch:</em> Distribuição por <em>Bag-of-Tasks</em>.</p>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="card-header text-red">3. Sharding de Dicionário</div>
      <p>Divisão dos padrões em <em>K</em> sub-dicionários (por prefixo). Reduz o tamanho de cada autômato na esperança de caber na cache L3. <em>(Hipótese testada)</em></p>
    </div>
    <div class="card">
      <div class="card-header text-red">4. Composição Bidimensional (2D)</div>
      <p>Combinação simultânea de particionamento de texto (chunking) e particionamento de dicionário (sharding). <em>(Hipótese testada)</em></p>
    </div>
  </div>
</div>

<h1 id="ambiente-experimental-e-workloads">Ambiente Experimental e Workloads</h1>
<h3 id="plataforma-de-testes">Plataforma de Testes:</h3>
<ul>
<li data-marpit-fragment="1"><strong>Processador:</strong> Intel Core i5-1235U (Arquitetura Alder Lake).
<ul>
<li data-marpit-fragment="2">2 P-Cores (4 threads de hardware, Hyper-Threading ativo) + 8 E-Cores (8 threads). Total: <strong>12 threads de hardware</strong>.</li>
<li data-marpit-fragment="3"><strong>Cache L3 Compartilhada:</strong> 12 MiB.</li>
<li data-marpit-fragment="4"><strong>Memória:</strong> 31 GiB DDR4 dual-channel (banda compartilhada na casa de dezenas de GB/s — o recurso disputado no regime memory-bound).</li>
</ul>
</li>
<li data-marpit-fragment="5"><strong>Compilador &amp; OS:</strong> C11, GCC 13.3.0 (<code>-O3 -march=native</code>), Linux Kernel 6.17.</li>
</ul>
<h3 id="dicion%C3%A1rios-de-teste-escalabilidade-de-footprint">Dicionários de Teste (Escalabilidade de Footprint):</h3>
<ul>
<li data-marpit-fragment="6"><strong>Snort-100:</strong> 100 regras → Autômato com <strong>1,93 MiB</strong> <span class="badge rq">Residente na Cache L3</span></li>
<li data-marpit-fragment="7"><strong>Snort-1k:</strong> ~1.000 regras → Autômato com <strong>11,92 MiB</strong> <span class="badge">Borda da Cache L3</span></li>
<li data-marpit-fragment="8"><strong>Snort (full):</strong> 4.188 regras → Autômato com <strong>55,23 MiB</strong> <span class="badge rq">Estoura a Cache L3</span></li>
<li data-marpit-fragment="9"><strong>Emerging Threats (ET):</strong> 44.678 regras → Autômato com <strong>506,78 MiB</strong> <span class="text-red">42× o tamanho da Cache L3</span></li>
</ul>

<h1 id="rigor-experimental-e-protocolo-de-medi%C3%A7%C3%A3o">Rigor Experimental e Protocolo de Medição</h1>
<p>Para afastar desvios comuns em benchmarks acadêmicos de sistemas paralelos:</p>
<ul>
<li data-marpit-fragment="1"><strong>Sweep Automatizado:</strong> Execução programada controlando rigidamente o tempo e o ruído térmico (banco de dados de medições <code>sweep.db</code>).</li>
<li data-marpit-fragment="2"><strong>Evitando o Efeito Boost:</strong> Processadores móveis sofrem <em>thermal throttling</em> sob estresse prolongado. Os dados coletados refletem o <strong>estado sustentado (sob carga)</strong> e estável, não picos frios de rajada.</li>
<li data-marpit-fragment="3"><strong>Protocolo por Medição:</strong> 2 execuções de aquecimento (<em>warm-up</em>) seguidas de 5 repetições para cada ponto de curva. Reportados throughput médio e coeficiente de variação (CV).</li>
<li data-marpit-fragment="4"><strong>Validação Absoluta de Correção:</strong>
<ul>
<li data-marpit-fragment="5">Verificação do hash <strong>MD5</strong> do fluxo de saída de casamento de padrões para todas as variantes experimentais contra o baseline sequencial (de 1 a 64 threads).</li>
<li data-marpit-fragment="6">Instrumentação via <strong>ThreadSanitizer</strong> para validar a ausência de <em>data races</em>.</li>
</ul>
</li>
</ul>

<h1 id="estrat%C3%A9gias-avaliadas">Estratégias Avaliadas</h1>
<p>Todas as variantes compartilham o mesmo autômato e são selecionáveis em tempo de execução. Cada eixo é isolado para atribuir o efeito a uma única causa, sempre comparado ao baseline sequencial.</p>
<table>
<thead>
<tr><th>Eixo de otimização</th><th>Estratégia</th></tr>
</thead>
<tbody>
<tr><td><strong>Baseline</strong></td><td>Varredura sequencial de thread única (referência de correção e speedup).</td></tr>
<tr><td rowspan="4"><strong>Paralelismo de texto</strong></td><td>Chunking estático homogêneo com overlap de borda.</td></tr>
<tr><td>Chunking estático refinado (padding de cache + laço warm-up/owned separado).</td></tr>
<tr><td>Chunking <em>topology-aware</em> (segmentos ponderados pela frequência do núcleo).</td></tr>
<tr><td>Dispatch dinâmico por contador atômico (<em>bag of tasks</em>).</td></tr>
<tr><td><strong>Layout de saída</strong></td><td class="text-green">Tabela de saída achatada e contígua (substitui a emissão por ponteiros).</td></tr>
<tr><td><strong>Paralelismo de dicionário</strong></td><td class="text-red">Sharding por prefixo em <em>K</em> sub-autômatos independentes.</td></tr>
<tr><td><strong>Composição</strong></td><td class="text-red">Combinação 2D de sharding de dicionário com chunking de texto.</td></tr>
</tbody>
</table>
</section>

<h1 id="estrat%C3%A9gias-de-balanceamento-de-carga">Estratégias de Balanceamento de Carga</h1>
<div class="grid">
  <div class="col-40">
    <h3>Enfrentando a Assimetria</h3>
    <p>Processadores híbridos (P-Cores vs E-Cores) geram desequilíbrio intrínseco. Estratégias projetadas:</p>
    <ul>
      <li><strong>(a) Static Homogeneous:</strong> Divisão igual de tarefas. Gera atrasos massivos de sincronização por conta dos <em>stragglers</em> (E-Cores).</li>
      <li><strong>(b) Topology-Aware:</strong> Divisão heurística (pesos fixos). Melhora muito, mas a perfeição matemática é inatingível na prática.</li>
      <li><strong>(c) Dynamic Dispatch:</strong> Consumo contínuo de um <em>Bag-of-Tasks</em> usando contadores atômicos para máxima adaptabilidade.</li>
    </ul>
  </div>
  <div class="col-60">
    <img src="figuras/load_balancing.svg" alt="Load Balancing" />
  </div>
</div>

<p>Throughput sequencial (monothread) medido mantendo o corpus estritamente fixo e alterando apenas o tamanho do autômato de transições:</p>
<div class="grid">
  <div class="col-65">
    <table>
      <thead>
        <tr>
          <th>Dicionário</th>
          <th>Padrões</th>
          <th>Tamanho</th>
          <th>Regime de Cache</th>
          <th>Throughput Monothread</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>Snort-100</strong></td>
          <td>100</td>
          <td>1,93 MiB</td>
          <td class="text-green">Interno à L3 (Residente)</td>
          <td class="text-blue">483,1 MB/s</td>
        </tr>
        <tr>
          <td><strong>Snort-1k</strong></td>
          <td>~1.000</td>
          <td>11,92 MiB</td>
          <td>Limite da L3</td>
          <td>337,3 MB/s</td>
        </tr>
        <tr>
          <td><strong>Snort (full)</strong></td>
          <td>4.188</td>
          <td>55,23 MiB</td>
          <td class="text-red">Extrapola a L3 (Estouro)</td>
          <td>240,7 MB/s</td>
        </tr>
        <tr>
          <td><strong>Emerging Threats</strong></td>
          <td>44.678</td>

<h1 id="resultados-balanceamento-em-cpus-h%C3%ADbridas">Resultados: Balanceamento em CPUs Híbridas</h1>
<p>Diferença de tempo de execução entre núcleos rápidos (Performance) e lentos (Efficiency) causa flutuações e barreiras de atraso (<em>stragglers</em>). Medição da variação temporal a 12 threads:</p>
<div class="grid">
  <div class="col-60">
    <table>
      <thead>
        <tr>
          <th>Estratégia de Partição</th>
          <th>Throughput Médio</th>
          <th>Coeficiente Variação (CV)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Static Homogeneous (Padrão)</td>
          <td>1.064,7 MB/s</td>
          <td class="text-red">39,9%</td>
        </tr>
        <tr>
          <td>Static Chunking (Com alinhamento)</td>
          <td>902,0 MB/s</td>
          <td class="text-red">52,9%</td>
        </tr>
        <tr>
          <td><strong>Topology-aware</strong> (Frequency-weighted)</td>
          <td>879,8 MB/s</td>
          <td class="text-green">1,7%</td>
        </tr>
        <tr>
          <td><strong>Dynamic Dispatch</strong> (Bag of Tasks)</td>
          <td>864,4 MB/s</td>
          <td class="text-green">3,3%</td>
        </tr>
        <tr>
          <td><strong>Flat Chunking</strong> (Particionado uniforme)</td>
          <td>1.007,2 MB/s</td>
          <td class="text-green">0,4%</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="col-40">
    <div class="card">
      <div class="card-header text-blue">Foco na Previsibilidade</div>
      <p>
        O particionamento balanceado reduz a variação de até <strong>52,9% para menos de 2%</strong>.<br />
        <strong>Impacto real:</strong> Não altera a velocidade intrínseca da transição de autômato, mas remove tempo morto de sincronização em barreira. Garante latência determinística no pior caso.
      </p>

<div class="grid">
  <div class="col-60">
    <img src="figuras/parallel_bfs.svg" alt="Level-Synchronous Parallel BFS" />
  </div>
  <div class="col-40">
    <div class="card">
      <div class="card-header text-red">O Desafio da Dependência</div>
      <p>Calcular o <em>failure link</em> $f(v)$ de um estado exige saber o $f(u)$ do seu ancestral. Distribuir estados aleatoriamente entre threads geraria <em>race conditions</em> ou exigiria <em>locks</em> pesados.</p>
    </div>
    <div class="card">
      <div class="card-header text-green">A Solução (Sem Locks)</div>
      <ul>
        <li><strong>Processamento por Níveis:</strong> A Trie é fatiada por profundidade.</li>
        <li><strong>Read-only Ascendente:</strong> Dependências (setas verdes) apontam apenas para níveis já calculados e estáticos.</li>
        <li><strong>Sincronização:</strong> Barreiras garantem consistência antes de descer de nível.</li>
      </ul>
    </div>
  </div>

<h1 id="conclus%C3%A3o">Conclusão</h1>
<blockquote>
  <strong>Achado central:</strong> o principal obstáculo para escalar o Aho–Corasick em escala de IDS é <strong>microarquitetural</strong> — estouro de cache e banda de DRAM —, não a lógica de casamento. A resposta correta é paralelizar o <strong>texto</strong> com um layout de emissão amigo da cache.
</blockquote>
<div class="grid">
  <div class="col">
    <div class="card">
      <div class="card-header text-blue">Objetivos atendidos</div>
      <ul>
        <li><strong>Implementação</strong> em C/pthreads, com correção validada em todos os workloads.</li>
        <li><strong>Ganhos quantificados:</strong> 4,79× / 4,52× de busca; eficiências de 37,7% e 23,3%.</li>
        <li><strong>Escalabilidade analisada:</strong> 7 contagens de thread, 3 corpora, autômatos cobrindo faixa de 42× a L3.</li>
      </ul>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="card-header text-green">Contribuições</div>
      <ul>
        <li><strong>Caracterização do regime memory-bound</strong> em CPU multi-core commodity, com identificação do ponto de saturação da DRAM.</li>
        <li><strong>Flat output layout:</strong> ganho limpo de até +13,0% onde o problema é mais difícil.</li>
        <li><strong>Resultados negativos:</strong> sharding e composição 2D falsificados, fechando uma região do espaço de design.</li>
      </ul>
    </div>
  </div>
</div>

<h1 id="amea%C3%A7as-%C3%A0-validade-e-trabalhos-futuros">Ameaças à Validade e Trabalhos Futuros</h1>
<div class="grid">
  <div class="col">
    <div class="card">
      <div class="card-header">Ameaças à Validade</div>
      <ul>
        <li><strong>Throttling Térmico:</strong> Hardware móvel restringe pico contínuo; mitigado com execução sustentada e repetições controladas.</li>
        <li><strong>Arquitetura Única:</strong> Avaliado em um processador híbrido. Todavia, a tese do gargalo de DRAM estende-se a servidores cujo autômato exceda a LLC compartilhada.</li>
        <li><strong>Telemetria Indireta:</strong> Diagnósticos baseados em throughput temporizado; ausência de amostragem por PMUs na placa.</li>
      </ul>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="card-header text-green">Trabalhos Futuros</div>
      <ul>
        <li><strong>Contadores de Hardware (PMU):</strong> Registrar cache-misses e stalls de pipeline por telemetria direta para consolidar o modelo microarquitetural.</li>
        <li><strong>Avaliação de Servidores:</strong> Executar em processadores de classe enterprise com maior banda de memória e caches L3 estendidas.</li>
        <li><strong>Sharding por Densidade:</strong> Agrupar shards por densidade real de transições frequentes e não meramente por primeiro byte.</li>
      </ul>
    </div>
  </div>
</div>
</section>
